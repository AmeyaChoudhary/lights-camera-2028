<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lights, Camera, 2028</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #FFD700;
    --gold-light: #FFE55C;
    --gold-dark: #C5A000;
    --bg-dark: #0a0a0f;
    --bg-card: #12121a;
    --bg-card-hover: #1a1a28;
    --text-primary: #f0f0f0;
    --text-secondary: #8888a0;
    --accent-pink: #FF6B9D;
    --accent-blue: #4ECDC4;
    --accent-purple: #A855F7;
    --accent-orange: #FF8C42;
    --accent-green: #34D399;
    --accent-red: #EF4444;
    --accent-cyan: #22D3EE;
    --accent-yellow: #FBBF24;
    --accent-indigo: #818CF8;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg-dark);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
  }

  /* ===== HERO ===== */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at 50% 50%, rgba(255,215,0,0.08) 0%, transparent 60%);
    animation: heroGlow 8s ease-in-out infinite alternate;
  }

  @keyframes heroGlow {
    0% { transform: scale(1) rotate(0deg); }
    100% { transform: scale(1.1) rotate(5deg); }
  }

  .hero-stars {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
  }

  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite alternate;
    opacity: 0;
  }

  @keyframes twinkle {
    0% { opacity: 0; transform: scale(0.5); }
    100% { opacity: var(--max-opacity); transform: scale(1); }
  }

  .hero-content {
    text-align: center;
    z-index: 2;
    animation: fadeInUp 1.5s ease-out;
  }

  .hero-subtitle {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 1rem;
  }

  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 8vw, 7rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold), #fff8dc, var(--gold-dark), var(--gold-light));
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 4s ease-in-out infinite;
    line-height: 1.1;
    margin-bottom: 1.5rem;
  }

  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .hero-tagline {
    font-family: 'Inter', sans-serif;
    font-size: 1.15rem;
    color: rgba(255,255,255,0.5);
    font-weight: 300;
    font-style: italic;
    margin-bottom: 1.5rem;
    letter-spacing: 0.5px;
  }

  .hero-meta {
    font-size: 1.1rem;
    color: var(--text-secondary);
    margin-bottom: 3rem;
    font-weight: 300;
  }

  .hero-meta span {
    color: var(--gold);
    font-weight: 600;
  }

  .scroll-indicator {
    position: absolute;
    bottom: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: var(--text-secondary);
    font-size: 0.8rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    animation: bounce 2s ease-in-out infinite;
    cursor: pointer;
  }

  .scroll-indicator .arrow {
    width: 20px; height: 20px;
    border-right: 2px solid var(--gold);
    border-bottom: 2px solid var(--gold);
    transform: rotate(45deg);
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(10px); }
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== SIDE NAV ===== */
  .sidenav {
    position: fixed;
    right: 24px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }

  .sidenav.visible {
    opacity: 1;
    pointer-events: auto;
  }

  .sidenav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    cursor: pointer;
    position: relative;
  }

  .sidenav-label {
    font-size: 0.7rem;
    font-weight: 500;
    color: transparent;
    letter-spacing: 0.5px;
    white-space: nowrap;
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(10px);
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid transparent;
    transition: all 0.3s ease;
    pointer-events: none;
  }

  .sidenav-item:hover .sidenav-label,
  .sidenav-item.active .sidenav-label {
    color: var(--text-primary);
    border-color: rgba(255,215,0,0.2);
  }

  .sidenav-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.2);
    transition: all 0.3s ease;
    flex-shrink: 0;
  }

  .sidenav-item:hover .sidenav-dot {
    background: rgba(255,215,0,0.4);
    border-color: var(--gold);
    transform: scale(1.3);
  }

  .sidenav-item.active .sidenav-dot {
    background: var(--gold);
    border-color: var(--gold);
    box-shadow: 0 0 8px rgba(255,215,0,0.5);
    transform: scale(1.3);
  }

  @media (max-width: 768px) {
    .sidenav { right: 10px; gap: 4px; }
    .sidenav-label { display: none; }
    .sidenav-dot { width: 8px; height: 8px; }
  }

  /* ===== SECTIONS ===== */
  .section {
    min-height: 100vh;
    padding: 120px 5vw 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }

  .section-number {
    font-family: 'Playfair Display', serif;
    font-size: clamp(6rem, 15vw, 12rem);
    font-weight: 900;
    position: absolute;
    top: 80px;
    right: 5vw;
    color: rgba(255,215,0,0.04);
    line-height: 1;
    pointer-events: none;
  }

  .section-header {
    text-align: center;
    margin-bottom: 3rem;
    z-index: 2;
  }

  .section-category {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.75rem;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 0.5rem;
  }

  .section-responses {
    font-size: 0.9rem;
    color: var(--text-secondary);
  }

  /* ===== WINNER PODIUM ===== */
  .winner-spotlight {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 3rem;
    z-index: 2;
  }

  .winner-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,215,0,0.05));
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 50px;
    padding: 12px 32px;
    margin-bottom: 1rem;
  }

  .winner-badge .trophy { font-size: 1.5rem; }

  .winner-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 700;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .winner-votes {
    font-size: 1.1rem;
    color: var(--text-secondary);
    font-weight: 300;
  }

  .winner-votes strong {
    color: var(--gold);
    font-weight: 700;
    font-size: 1.3rem;
  }

  /* ===== CHART CONTAINER ===== */
  .chart-area {
    width: 100%;
    max-width: 900px;
    z-index: 2;
  }

  /* ===== BAR CHART ===== */
  .bar-chart {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 12px;
    opacity: 0;
    transform: translateX(-30px);
    transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .bar-row.visible {
    opacity: 1;
    transform: translateX(0);
  }

  .bar-rank {
    width: 28px;
    text-align: center;
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--text-secondary);
    flex-shrink: 0;
  }

  .bar-row:nth-child(1) .bar-rank { color: var(--gold); font-size: 1rem; }
  .bar-row:nth-child(2) .bar-rank { color: #C0C0C0; }
  .bar-row:nth-child(3) .bar-rank { color: #CD7F32; }

  .bar-label {
    width: 160px;
    text-align: right;
    font-size: 0.9rem;
    font-weight: 500;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .bar-track {
    flex: 1;
    height: 32px;
    background: rgba(255,255,255,0.03);
    border-radius: 6px;
    overflow: hidden;
    position: relative;
  }

  .bar-fill {
    height: 100%;
    border-radius: 6px;
    width: 0;
    transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 10px;
    min-width: 40px;
  }

  .bar-fill.animated { width: var(--target-width); }

  .bar-value {
    font-size: 0.8rem;
    font-weight: 700;
    color: rgba(0,0,0,0.7);
    white-space: nowrap;
  }

  .bar-fill-light .bar-value { color: rgba(0,0,0,0.8); }
  .bar-fill-dark .bar-value { color: rgba(255,255,255,0.9); }

  .chart-label {
    font-size: 0.8rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 1rem;
    text-align: left;
    width: 100%;
  }

  .bar-row.other-row .bar-label {
    color: var(--text-secondary);
    font-style: italic;
  }

  .bar-row.other-row .bar-fill {
    background: #444 !important;
    opacity: 0.6;
  }

  /* ===== DONUT CHART ===== */
  .donut-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3rem;
    flex-wrap: wrap;
    width: 100%;
    max-width: 800px;
  }

  .donut-svg {
    width: 280px;
    height: 280px;
    transform: rotate(-90deg);
  }

  .donut-segment {
    fill: none;
    stroke-width: 35;
    stroke-dasharray: 0 1000;
    transition: stroke-dasharray 1.5s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .donut-legend {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.9rem;
  }

  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .legend-name { font-weight: 500; }
  .legend-count { color: var(--text-secondary); font-weight: 300; }

  /* ===== HEAD TO HEAD ===== */
  .h2h {
    display: flex;
    width: 100%;
    max-width: 900px;
    gap: 4px;
    margin-bottom: 3rem;
    border-radius: 16px;
    overflow: hidden;
    min-height: 280px;
  }

  .h2h-side {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 2rem;
    position: relative;
    overflow: hidden;
    transition: flex 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .h2h-left {
    background: linear-gradient(135deg, rgba(255,107,157,0.15), rgba(255,107,157,0.05));
    border: 1px solid rgba(255,107,157,0.2);
  }

  .h2h-right {
    background: linear-gradient(135deg, rgba(78,205,196,0.15), rgba(78,205,196,0.05));
    border: 1px solid rgba(78,205,196,0.2);
  }

  .h2h-vs {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 900;
    color: var(--gold);
    background: var(--bg-dark);
    width: 50px;
    height: 50px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid var(--gold);
  }

  .h2h-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.5rem, 3vw, 2.2rem);
    font-weight: 700;
    margin-bottom: 0.5rem;
    text-align: center;
  }

  .h2h-left .h2h-name { color: var(--accent-pink); }
  .h2h-right .h2h-name { color: var(--accent-blue); }

  .h2h-count {
    font-size: 3.5rem;
    font-weight: 900;
    font-family: 'Space Grotesk', sans-serif;
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .h2h-count.visible {
    opacity: 1;
    transform: scale(1);
  }

  .h2h-left .h2h-count { color: var(--accent-pink); }
  .h2h-right .h2h-count { color: var(--accent-blue); }

  .h2h-label {
    font-size: 0.85rem;
    color: var(--text-secondary);
    margin-top: 0.25rem;
  }

  .h2h-note {
    text-align: center;
    color: var(--text-secondary);
    font-size: 0.9rem;
    font-style: italic;
    margin-top: -1.5rem;
    margin-bottom: 2rem;
  }

  /* ===== WORD CLOUD ===== */
  .word-cloud {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 8px 14px;
    max-width: 800px;
    padding: 2rem;
    margin-top: 2rem;
  }

  .cloud-word {
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    cursor: default;
    line-height: 1.2;
    font-weight: 600;
  }

  .cloud-word.visible {
    opacity: var(--word-opacity);
    transform: scale(1);
  }

  .cloud-word:hover {
    opacity: 1 !important;
    transform: scale(1.15);
  }

  /* ===== STATS GRID ===== */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1.5rem;
    width: 100%;
    max-width: 900px;
    margin-top: 2rem;
  }

  .stat-card {
    background: var(--bg-card);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 1.5rem;
    text-align: center;
    transition: all 0.3s;
  }

  .stat-card:hover {
    background: var(--bg-card-hover);
    border-color: rgba(255,215,0,0.2);
    transform: translateY(-4px);
  }

  .stat-value {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 2.5rem;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 0.5rem;
  }

  .stat-label {
    font-size: 0.85rem;
    color: var(--text-secondary);
    font-weight: 400;
  }

  /* ===== FOOTER ===== */
  .footer {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-secondary);
    font-size: 0.85rem;
    border-top: 1px solid rgba(255,255,255,0.05);
  }

  .footer .title {
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    font-size: 1.2rem;
    margin-bottom: 0.5rem;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {
    .section { padding: 100px 4vw 60px; }
    .bar-label { width: 110px; font-size: 0.8rem; }
    .h2h { flex-direction: column; min-height: auto; }
    .h2h-vs { display: none; }
    .donut-container { flex-direction: column; }
    .nav a { font-size: 0.65rem; padding: 5px 8px; }
  }

  /* ===== CONFETTI ===== */
  .confetti-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 200;
    overflow: hidden;
  }

  .confetti-piece {
    position: absolute;
    width: 8px;
    height: 8px;
    top: -10px;
    animation: confetti-fall linear forwards;
  }

  @keyframes confetti-fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>

// ===== BUILD SECTIONS =====
const sectionsEl = document.getElementById('sections');

DATA.forEach((q, qi) => {
  const sec = document.createElement('section');
  sec.className = 'section';
  sec.id = q.id;

  let chartHTML = '';
  const maxVal = q.data[0][1];
  const shown = q.data.filter(d => d[1] >= 2);
  const shownVotes = shown.reduce((s,d) => s+d[1], 0);
  const otherVotes = q.responses - shownVotes;

  function buildBarRows(data, maxV, colorFn) {
    let rows = data.map((d,i) => `
          <div class="bar-row" style="transition-delay:${i*0.08}s">
            <div class="bar-rank">${i+1}</div>
            <div class="bar-label">${d[0]}</div>
            <div class="bar-track">
              <div class="bar-fill bar-fill-light" style="--target-width:${(d[1]/maxV*100)}%;background:${colorFn(i)}">
                <span class="bar-value">${d[1]}</span>
              </div>
            </div>
          </div>`).join('');
    if (otherVotes > 0) {
      rows += `
          <div class="bar-row other-row" style="transition-delay:${data.length*0.08}s">
            <div class="bar-rank"></div>
            <div class="bar-label">Other (${otherVotes})</div>
            <div class="bar-track">
              <div class="bar-fill bar-fill-light" style="--target-width:${(otherVotes/maxV*100)}%;background:#444">
                <span class="bar-value" style="color:rgba(255,255,255,0.7)">${otherVotes}</span>
              </div>
            </div>
          </div>`;
    }
    return rows;
  }

  if (q.chartType === 'h2h') {
    const h2hNote = q.tag || '';
    chartHTML = `
      <div class="winner-spotlight">
        <div class="winner-badge"><span class="trophy">&#127942;</span><span style="color:var(--gold);font-weight:600;font-size:1.1rem;">WINNER</span></div>
        <div class="winner-name">${q.winner}</div>
        <div class="winner-votes"><strong>${q.winnerVotes}</strong> votes out of ${q.responses}</div>
      </div>
      <div class="h2h" style="position:relative;">
        <div class="h2h-side h2h-left">
          <div class="h2h-name">${q.h2h.left.name}</div>
          <div class="h2h-count" data-target="${q.h2h.left.votes}">0</div>
          <div class="h2h-label">votes</div>
        </div>
        <div class="h2h-vs">VS</div>
        <div class="h2h-side h2h-right">
          <div class="h2h-name">${q.h2h.right.name}</div>
          <div class="h2h-count" data-target="${q.h2h.right.votes}">0</div>
          <div class="h2h-label">votes</div>
        </div>
      </div>
      <div class="h2h-note">${h2hNote}</div>
      <div class="chart-area">
        <div class="chart-label">Everyone with 2+ votes</div>
        <div class="bar-chart">${buildBarRows(shown, maxVal, i => i===0?'var(--accent-pink)':i===1?'var(--accent-blue)':COLORS_POOL[(i+2)%COLORS_POOL.length])}
        </div>
      </div>`;
  } else if (q.chartType === 'donut') {
    const topN = q.data.slice(0, 8);
    const otherCount = q.data.slice(8).reduce((s,d) => s+d[1], 0) + (q.responses - q.data.reduce((s,d) => s+d[1], 0));
    const allSlices = [...topN];
    if (otherCount > 0) allSlices.push(['Other', otherCount]);
    const total = allSlices.reduce((s,d) => s+d[1], 0);
    const circumference = 2 * Math.PI * 90;

    let offset = 0;
    const segments = allSlices.map((d, i) => {
      const len = (d[1] / total) * circumference;
      const seg = `<circle class="donut-segment" cx="140" cy="140" r="90"
        stroke="${i < topN.length ? COLORS_POOL[i % COLORS_POOL.length] : '#444'}"
        stroke-dasharray="0 ${circumference}"
        data-len="${len}" data-gap="${circumference - len}"
        stroke-dashoffset="${-offset}"
        />`;
      offset += len;
      return seg;
    });

    const legendHTML = allSlices.map((d, i) => `
      <div class="legend-item">
        <div class="legend-dot" style="background:${i < topN.length ? COLORS_POOL[i % COLORS_POOL.length] : '#444'}"></div>
        <span class="legend-name">${d[0]}</span>
        <span class="legend-count">(${d[1]})</span>
      </div>`).join('');

    chartHTML = `
      <div class="winner-spotlight">
        <div class="winner-badge"><span class="trophy">&#127942;</span><span style="color:var(--gold);font-weight:600;">WINNER</span></div>
        <div class="winner-name">${q.winner}</div>
        <div class="winner-votes"><strong>${q.winnerVotes}</strong> votes out of ${q.responses}</div>
      </div>
      ${q.tag ? `<div class="h2h-note">${q.tag}</div>` : ''}
      <div class="donut-container">
        <svg class="donut-svg" viewBox="0 0 280 280">${segments.join('')}</svg>
        <div class="donut-legend">${legendHTML}</div>
      </div>`;
  } else {
    chartHTML = `
      <div class="winner-spotlight">
        <div class="winner-badge"><span class="trophy">&#127942;</span><span style="color:var(--gold);font-weight:600;">WINNER</span></div>
        <div class="winner-name">${q.winner}</div>
        <div class="winner-votes"><strong>${q.winnerVotes}</strong> votes out of ${q.responses}</div>
      </div>
      ${q.tag ? `<div class="h2h-note">${q.tag}</div>` : ''}
      <div class="chart-area">
        <div class="chart-label">Everyone with 2+ votes</div>
        <div class="bar-chart">${buildBarRows(shown, maxVal, i => COLORS_POOL[i%COLORS_POOL.length])}
        </div>
      </div>`;
  }

  // Word cloud
  const maxW = q.allWords[0][1];
  const cloudHTML = q.allWords.map((w, i) => {
    const size = Math.max(0.7, (w[1] / maxW) * 2.8);
    const opacity = Math.max(0.35, (w[1] / maxW) * 0.9 + 0.1);
    const color = COLORS_POOL[i % COLORS_POOL.length];
    return `<span class="cloud-word" style="font-size:${size}rem;color:${color};--word-opacity:${opacity};transition-delay:${i * 0.03}s" title="${w[0]}: ${w[1]} votes">${w[0]}</span>`;
  }).join(' ');

  sec.innerHTML = `
    <div class="section-number">${q.num}</div>
    <div class="section-header">
      <div class="section-category">${q.category}</div>
      <h2 class="section-title">${q.title}</h2>
      <div class="section-responses">${q.responses} responses</div>
    </div>
    ${chartHTML}
    <div class="word-cloud">${cloudHTML}</div>
  `;

  sectionsEl.appendChild(sec);
});

// ===== SCROLL ANIMATIONS =====
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (!entry.isIntersecting) return;

    const el = entry.target;

    // Bar rows
    el.querySelectorAll('.bar-row').forEach(row => {
      row.classList.add('visible');
      row.querySelector('.bar-fill')?.classList.add('animated');
    });

    // Word cloud
    el.querySelectorAll('.cloud-word').forEach(w => w.classList.add('visible'));

    // Donut segments
    el.querySelectorAll('.donut-segment').forEach(seg => {
      const len = seg.getAttribute('data-len');
      const gap = seg.getAttribute('data-gap');
      seg.style.strokeDasharray = `${len} ${gap}`;
    });

    // H2H count up
    el.querySelectorAll('.h2h-count').forEach(countEl => {
      countEl.classList.add('visible');
      const target = parseInt(countEl.dataset.target);
      let current = 0;
      const step = Math.ceil(target / 40);
      const interval = setInterval(() => {
        current += step;
        if (current >= target) { current = target; clearInterval(interval); }
        countEl.textContent = current;
      }, 30);
    });

    // Confetti for Q5 (the tie!)
    if (el.id === 'q5' && !el.dataset.confettied) {
      el.dataset.confettied = 'true';
      setTimeout(() => launchConfetti(), 800);
    }
  });
}, { threshold: 0.2 });

document.querySelectorAll('.section').forEach(sec => observer.observe(sec));

  const item = document.createElement('a');
  item.className = 'sidenav-item';
  item.href = '#' + id;

  sidenav.appendChild(item);
});

// Show/hide sidenav based on hero
const heroEl = document.querySelector('.hero');
const navObserver = new IntersectionObserver(([entry]) => {
  sidenav.classList.toggle('visible', !entry.isIntersecting);
}, { threshold: 0.1 });
navObserver.observe(heroEl);

// Active sidenav item
const sidenavItems = sidenav.querySelectorAll('.sidenav-item');
const sectionObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      sidenavItems.forEach(a => a.classList.remove('active'));
      const active = sidenav.querySelector(`a[href="#${entry.target.id}"]`);
      if (active) active.classList.add('active');
    }
  });
}, { threshold: 0.3 });

document.querySelectorAll('.hero, .section').forEach(s => sectionObserver.observe(s));

// ===== CONFETTI =====
function launchConfetti() {
  const container = document.createElement('div');
  container.className = 'confetti-container';
  document.body.appendChild(container);
  const colors = ['#FFD700','#FF6B9D','#4ECDC4','#A855F7','#FF8C42','#34D399','#FBBF24','#fff'];
  for (let i = 0; i < 80; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    piece.style.animationDelay = Math.random() * 0.8 + 's';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.width = (5 + Math.random() * 8) + 'px';
    piece.style.height = (5 + Math.random() * 8) + 'px';
    container.appendChild(piece);
  }
  setTimeout(() => container.remove(), 4000);
}
